name: Build native dependencies (OpenAL-Soft)

env:
    OPENALSOFT_VERSION: 1.23.1 # Make sure this matches the version mentioned in the description in the .nuspec file.

on:
    pull_request:
    workflow_call:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    windows:
        name: Windows (x86 + x64)
        runs-on: windows-2022
        steps:
            - name: Setup Dependencies
              shell: pwsh
              run: |
                New-Item -ItemType Directory -Force artifacts/x86 | Out-Null
                New-Item -ItemType Directory -Force artifacts/x64 | Out-Null

            - name: Download sources
              shell: pwsh
              run: |
                $version = ${env:OPENALSOFT_VERSION}
                $archive = "openal-soft-$version.tar.bz2"
                $url = "https://openal-soft.org/openal-releases/$archive"

                Invoke-WebRequest -Uri $url -OutFile $archive

                $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
                & $sevenZip x $archive -y
                & $sevenZip x "openal-soft-$version.tar" -y

            - name: Build x86
              shell: pwsh
              run: |
                cmake -S "openal-soft-${env:OPENALSOFT_VERSION}" -B build-win32 -A Win32 -DALSOFT_EXAMPLES=OFF -DALSOFT_UTILS=OFF -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release
                cmake --build build-win32 --config Release
                Copy-Item "build-win32\Release\OpenAL32.dll" "artifacts\x86\soft_oal.dll"

            - name: Build x64
              shell: pwsh
              run: |
                cmake -S "openal-soft-${env:OPENALSOFT_VERSION}" -B build-x64 -A x64 -DALSOFT_EXAMPLES=OFF -DALSOFT_UTILS=OFF -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release
                cmake --build build-x64 --config Release
                Copy-Item "build-x64\Release\OpenAL32.dll" "artifacts\x64\soft_oal.dll"

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: Natives-Windows
                path: ./artifacts

    macos:
        name: macOS (x64 + arm64)
        runs-on: macos-14
        steps:
            - name: Setup Dependencies
              run: |
                mkdir -p artifacts/x86_64
                mkdir artifacts/arm64

            - name: Compile natives
              run: |
                curl -s -L -O https://openal-soft.org/openal-releases/openal-soft-${OPENALSOFT_VERSION}.tar.bz2
                tar xf openal-soft-${OPENALSOFT_VERSION}.tar.bz2
                cd openal-soft-${OPENALSOFT_VERSION}
                cmake -B build -DCMAKE_OSX_DEPLOYMENT_TARGET=10.9 -DALSOFT_EXAMPLES=OFF -DALSOFT_UTILS=OFF -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET=10.11 -DCMAKE_POLICY_VERSION_MINIMUM=3.5
                cmake --build build
                lipo -thin x86_64 build/libopenal.${OPENALSOFT_VERSION}.dylib -output ../artifacts/x86_64/soft_oal.dylib
                lipo -thin arm64 build/libopenal.${OPENALSOFT_VERSION}.dylib -output ../artifacts/arm64/soft_oal.dylib

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: Natives-MacOS
                path: ./artifacts

    # Note: Running inside a Rocky Linux container because we want to compile using a version of glibc
    # that is as old as reasonably possible to ensure backwards compatibility of the compiled binaries.
    linux-x64:
        name: Linux (x64)
        runs-on: ubuntu-22.04
        container: rockylinux:8
        steps:
            - name: Setup Dependencies
              run: |
                mkdir -p artifacts/x64
                dnf -y install epel-release
                yum -y install gcc-c++ gcc cmake bzip2
                yum -y install alsa-lib-devel portaudio-devel pulseaudio-libs-devel pipewire-devel

            - name: Compile natives
              run: |
                curl -s -L -O https://openal-soft.org/openal-releases/openal-soft-${OPENALSOFT_VERSION}.tar.bz2
                tar xf openal-soft-${OPENALSOFT_VERSION}.tar.bz2
                cd openal-soft-${OPENALSOFT_VERSION}/build
                cmake .. -DBUILD_SHARED_LIBS=true -DCMAKE_BUILD_TYPE=Release
                cmake --build .
                cp libopenal.so ../../artifacts/x64/soft_oal.so

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: Natives-Linux(x64)
                path: ./artifacts

    linux-arm64:
        name: Linux (arm64)
        runs-on: ubuntu-22.04-arm
        steps:
            - name: Setup Dependencies
              run: |
                mkdir -p artifacts/arm64
                sudo apt-get install -y build-essential curl cmake libasound2-dev portaudio19-dev libpulse-dev libpipewire-0.3-dev
            - name: Compile Natives
              run: |
                curl -s -L -O https://openal-soft.org/openal-releases/openal-soft-${OPENALSOFT_VERSION}.tar.bz2
                tar xf openal-soft-${OPENALSOFT_VERSION}.tar.bz2
                cd openal-soft-${OPENALSOFT_VERSION}/build
                cmake .. -DBUILD_SHARED_LIBS=true -DCMAKE_BUILD_TYPE=Release
                cmake --build .
                cp libopenal.so ../../artifacts/arm64/soft_oal.so

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: Natives-Linux(arm64)
                path: ./artifacts
